interface=br-corp
bind-interfaces
except-interface=lo
except-interface=wlan0
except-interface=eth0
dhcp-range=10.0.1.50,10.0.1.200,255.255.255.0,1h
# No default gateway - students keep their own internet
dhcp-option=3
# No DNS override
dhcp-option=6
# Static routes to OT Range subnets via Sysrupt gateway
# Option 121 = classless static routes (RFC 3442)
# Format: subnet/prefix,gateway
dhcp-option=121,10.0.2.0/24,10.0.1.1,10.0.3.0/24,10.0.1.1,10.0.4.0/24,10.0.1.1,10.0.5.0/24,10.0.1.1
dhcp-option=option:domain-name,corp.watertreatment.local
domain=corp.watertreatment.local
log-dhcp
log-facility=/var/log/ot-range-dnsmasq.log
