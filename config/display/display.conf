# Sysrupt OT Range - ILI9341 display configuration
display:
  interface: bitbang
  driver: ili9341
  width: 320
  height: 240
  rotate: 0
  bgr: false
  h_offset: 0
  v_offset: 0
  gpio:
    sclk: 21
    mosi: 20
    cs: 16
    dc: 18
    rst: 17
    backlight: 5
  spi:
    bus: 1
    device: 0
    speed_hz: 32000000
  screens:
    splash:
      rotation: 0
    plant_status:
      rotation: 0
    network_status:
      rotation: 0
    scoreboard:
      rotation: 0
    attack_feed:
      rotation: 0
    victory:
      rotation: 0
  colors:
    background: "#000000"
    text: "#FFFFFF"
    ok: "#00FF00"
    warn: "#FFAA00"
    alarm: "#FF0000"
    accent: "#00AAFF"
