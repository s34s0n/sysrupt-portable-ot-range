<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CWA Historian{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="header-inner">
            <span class="brand">CWA Process Historian</span>
            <nav>
                {% if session.get('user_id') %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('query') }}">Query</a>
                <a href="{{ url_for('data_browser') }}">Data Browser</a>
                <a href="{{ url_for('logout') }}">Logout</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <footer><p>CWA Process Historian v2.1 &mdash; Data Retention: 90 days</p></footer>
</body>
</html>
