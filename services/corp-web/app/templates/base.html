<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}City Water Authority{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<!-- CWA Intranet v3.2.1 - Internal Use Only -->
<!-- TODO: Update default credentials before go-live (ticket #4521) -->
<body>
    <header>
        <div class="header-inner">
            <div class="logo-area">
                <svg class="logo-svg" viewBox="0 0 40 40" width="40" height="40">
                    <circle cx="20" cy="20" r="18" fill="#0066cc"/>
                    <path d="M20 8 C20 8, 12 20, 12 26 C12 30.4 15.6 34 20 34 C24.4 34 28 30.4 28 26 C28 20 20 8 20 8Z" fill="white"/>
                </svg>
                <span class="logo-text">City Water Authority</span>
            </div>
            <nav>
                <a href="{{ url_for('home') }}">Home</a>
                {% if session.get('user_id') %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('webmail') }}">Webmail</a>
                <a href="{{ url_for('files_list') }}">Files</a>
                <a href="{{ url_for('admin') }}">Admin</a>
                <a href="{{ url_for('logout') }}">Logout ({{ session.get('name','') }})</a>
                {% else %}
                <a href="{{ url_for('login') }}">Employee Login</a>
                {% endif %}
                <a href="{{ url_for('contact') }}">Contact</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2026 City Water Authority &mdash; Serving Clean Water Since 1985</p>
        <!-- Debug: employee API at /api/employee/<id> -->
    </footer>
</body>
</html>
