name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: ruff check . --select=E9,F63,F7,F82 --statistics
        # Only catch genuine errors for now (syntax, undefined names, etc.)
        # Style enforcement can be tightened later.

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck install.sh scripts/*.sh tests/*.sh || true
        # Non-blocking until scripts are cleaned up.

  syntax-check:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python files
        run: |
          python -m compileall -q services/ orchestrator/ physics/ ctf/ display/

  jekyll-build:
    name: Build student site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Build Jekyll site
        working-directory: docs
        run: |
          gem install bundler jekyll jekyll-remote-theme
          jekyll build --safe
