challenge:
  id: 2
  name: "intelligence_gathering"
  category: "recon"
  difficulty: "easy"
  points: 200
  zone: "dmz"
  description: "Gather intelligence about the OT infrastructure through the OPC-UA gateway."
  flag:
    value: "SYSRUPT{0pc_u4_1nt3l_g4th3r3d}"
    location: "OPC-UA gateway service history node"
  hints:
    - delay_minutes: 15
      text: "The DMZ hosts a data gateway that aggregates plant information."
    - delay_minutes: 30
      text: "Try browsing the OPC-UA server anonymously - no credentials needed."
    - delay_minutes: 45
      text: "Dig deep into the node tree - check maintenance/service history."
  solution:
    summary: "Browse the OPC-UA gateway anonymously and find the flag in service history."
    tools: ["opcua-client", "UaExpert"]
    steps:
      - "Connect to the OPC-UA gateway on port 4840"
      - "Browse the WaterTreatmentPlant node tree"
      - "Navigate to PlantInfo > Maintenance > ServiceHistory"
      - "Read the Notes field in Entry_2024_03_15"
